<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Create Account — Hostel Attendance Register</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="wrap" style="max-width:460px;">
  <header class="masthead">
    <div class="seal">Office of Student Affairs</div>
    <h1>Hostel Attendance Register</h1>
    <p>Step 1 — Create your login credential</p>
  </header>

  <div class="card">
    <h2 class="section-title">Create Account</h2>
    <form id="signupForm">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" required />

      <label for="email">E-mail Address</label>
      <input type="email" id="email" name="email" autocomplete="email" required />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="new-password" required minlength="6" />

      <div class="form-actions">
        <button type="submit">Create Credential</button>
      </div>
      <div id="msg" class="msg"></div>
    </form>
    <p class="switch-link">Already registered? <a href="/index.html">Sign in instead</a></p>
  </div>
</div>

<script>
  document.getElementById("signupForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const msg = document.getElementById("msg");
    msg.className = "msg";
    const username = document.getElementById("username").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    try {
      const res = await fetch("/api/auth/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, email, password }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Signup failed.");
      // Straight to CSV import — the required first step after account creation
      window.location.href = "/upload.html";
    } catch (err) {
      msg.textContent = err.message;
      msg.className = "msg error";
    }
  });
</script>
</body>
</html>
