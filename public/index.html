<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign In — Hostel Attendance Register</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="wrap" style="max-width:460px;">
  <header class="masthead">
    <div class="seal">Office of Student Affairs</div>
    <h1>Hostel Attendance Register</h1>
    <p>A ledger for room-wise daily attendance</p>
  </header>

  <div class="card">
    <h2 class="section-title">Sign In</h2>
    <form id="loginForm">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" required />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required />

      <div class="form-actions">
        <button type="submit">Sign In</button>
      </div>
      <div id="msg" class="msg"></div>
    </form>
    <p class="switch-link">No account yet? <a href="/signup.html">Create a login credential</a></p>
  </div>

  <p class="footer-note">All records are stored locally in this application's own database.</p>
</div>

<script>
  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const msg = document.getElementById("msg");
    msg.className = "msg";
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;

    try {
      const res = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Login failed.");
      window.location.href = "/dashboard.html";
    } catch (err) {
      msg.textContent = err.message;
      msg.className = "msg error";
    }
  });

  // If already logged in, skip straight to the app
  fetch("/api/auth/session").then(r => r.json()).then(d => {
    if (d.loggedIn) window.location.href = "/dashboard.html";
  });
</script>
</body>
</html>
